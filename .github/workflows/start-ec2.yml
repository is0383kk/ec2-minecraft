name: Start Minecraft EC2

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Check instance state
        id: check_state
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "Current state: ${STATE}"

      - name: Start EC2 instance
        if: steps.check_state.outputs.state == 'stopped'
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}

      - name: Wait for instance to be running
        if: steps.check_state.outputs.state == 'stopped'
        run: |
          aws ec2 wait instance-running --instance-ids ${{ secrets.EC2_INSTANCE_ID }}

      - name: Get public IP
        id: get_ip
        if: steps.check_state.outputs.state == 'stopped' || steps.check_state.outputs.state == 'running'
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "public_ip=${PUBLIC_IP}" >> "$GITHUB_OUTPUT"
          echo "Public IP: ${PUBLIC_IP}"

      - name: Notify Discord (started)
        if: steps.check_state.outputs.state == 'stopped'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Minecraft サーバーが起動しました！\nIP: \`${{ steps.get_ip.outputs.public_ip }}\`\"}"

      - name: Notify Discord (already running)
        if: steps.check_state.outputs.state == 'running'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Minecraft サーバーは既に起動しています。\nIP: \`${{ steps.get_ip.outputs.public_ip }}\`\"}"

      - name: Notify Discord (pending)
        if: steps.check_state.outputs.state == 'pending'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Minecraft サーバーは現在起動処理中です。しばらくお待ちください。\"}"

      - name: Notify Discord (stopping)
        if: steps.check_state.outputs.state == 'stopping'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Minecraft サーバーは停止処理中のため起動できません。完了後に再度お試しください。\"}"
